<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web Communication App</title>
    <style>
        body { margin: 0; padding-bottom: 3rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; }
        #form { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: fixed; bottom: 0; left: 0; right: 0; display: flex; height: 3rem; box-sizing: border-box; backdrop-filter: blur(10px); }
        #input { border: none; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; }
        #input:focus { outline: none; }
        #form > button { background: #333; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 3px; outline: none; color: #fff; cursor: pointer; font-weight: bold; }
        #messages { list-style-type: none; margin: 0; padding: 0; }
        #messages > li { padding: 0.5rem 1rem; background: #fff; margin: 0.5rem; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        #messages > li:nth-child(odd) { background: #eef2ff; }
        #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #setup input { padding: 0.5rem; font-size: 1rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; }
        #setup button { padding: 0.5rem 1rem; font-size: 1rem; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #chat-room { display: none; }
    </style>
</head>
<body>

    <!-- Step 1: Choose a Username -->
    <div id="setup">
        <h2>Enter your name to start communicating</h2>
        <input type="text" id="username" placeholder="Your name..." autocomplete="off" />
        <button onclick="startChat()">Join Chat</button>
    </div>

    <!-- Step 2: The actual Chat Area -->
    <div id="chat-room">
        <ul id="messages"></ul>
        <form id="form" action="">
            <input id="input" autocomplete="off" placeholder="Type a message..." /><button>Send</button>
        </form>
    </div>

    <!-- Load the socket.io client script automatically provided by the server -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUsername = "";

        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');

        function startChat() {
            const nameInput = document.getElementById('username').value.trim();
            if (nameInput) {
                myUsername = nameInput;
                document.getElementById('setup').style.display = 'none';
                document.getElementById('chat-room').style.display = 'block';
            }
        }

        // Handle sending messages
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                const messageData = {
                    user: myUsername,
                    text: input.value
                };
                // Emit event to server
                socket.emit('chat message', messageData);
                input.value = '';
            }
        });

        // Handle receiving messages
        socket.on('chat message', (data) => {
            const item = document.createElement('li');
            item.innerHTML = `<strong>${data.user}:</strong> ${data.text}`;
            messages.appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
        });
    </script>
</body>
</html>
